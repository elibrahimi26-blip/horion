services:
  db:
    image: postgres:16-alpine
    container_name: horion-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: horion
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: horion
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U horion -d horion"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: horion-app:latest
    container_name: horion-app
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: horion-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
