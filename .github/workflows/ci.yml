name: CI

on:
  push:
    branches: [main, dev, "claude/**"]
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: postgresql://horion:horion@localhost:5432/horion_test
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret-at-least-32-chars-long-for-validation

    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup@v4 lit la version depuis le champ `packageManager`
      # de package.json (pnpm@9.12.2). Ne pas spécifier `version` ici sinon
      # le setup échoue avec ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
